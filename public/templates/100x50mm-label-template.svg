<?xml version="1.0" encoding="UTF-8"?>
<!-- Speedy Print | 100×50mm Label Artwork Template
     Final size: 100 × 50 mm  |  Bleed: 3 mm all sides  |  Safe zone: 3 mm inside trim
     Total artboard (with bleed): 106 × 56 mm
     Colour mode: CMYK  |  Resolution: 300 DPI minimum  |  Fonts: Outlined/Embedded
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="212mm" height="112mm"
     viewBox="0 0 212 112"
     font-family="Arial, Helvetica, sans-serif">

  <!-- Outer frame -->
  <rect x="0" y="0" width="212" height="112" fill="#F3F4F6"/>

  <!-- Scale-up wrapper centred in the viewBox (2× scale: 106→212, 56→112 maps neatly) -->
  <g transform="translate(53, 28) scale(1)">

    <!-- ░░░ BLEED AREA ░░░ -->
    <rect x="0" y="0" width="106" height="56" fill="#FFE8EA"/>
    <text x="1" y="4" font-size="2" fill="#CC2233" font-weight="bold">BLEED</text>

    <!-- ░░░ TRIM LINE ░░░ -->
    <rect x="3" y="3" width="100" height="50" fill="white" stroke="#000000" stroke-width="0.25" stroke-dasharray="3,1.5"/>
    <text x="4" y="6.5" font-size="2" fill="#333333">TRIM LINE</text>

    <!-- ░░░ SAFE ZONE ░░░ -->
    <rect x="6" y="6" width="94" height="44" fill="#F8FAFF" stroke="#2563EB" stroke-width="0.3" stroke-dasharray="2,1.5"/>
    <text x="7" y="9.5" font-size="2" fill="#2563EB">SAFE ZONE</text>

    <!-- Crop marks -->
    <line x1="0" y1="3" x2="2" y2="3" stroke="#000" stroke-width="0.15"/>
    <line x1="3" y1="0" x2="3" y2="2" stroke="#000" stroke-width="0.15"/>
    <line x1="104" y1="3" x2="106" y2="3" stroke="#000" stroke-width="0.15"/>
    <line x1="103" y1="0" x2="103" y2="2" stroke="#000" stroke-width="0.15"/>
    <line x1="0" y1="53" x2="2" y2="53" stroke="#000" stroke-width="0.15"/>
    <line x1="3" y1="54" x2="3" y2="56" stroke="#000" stroke-width="0.15"/>
    <line x1="104" y1="53" x2="106" y2="53" stroke="#000" stroke-width="0.15"/>
    <line x1="103" y1="54" x2="103" y2="56" stroke="#000" stroke-width="0.15"/>

    <!-- Content placeholder -->
    <text x="53" y="29" text-anchor="middle" font-size="5" fill="#AAAAAA" font-weight="bold">PLACE ARTWORK HERE</text>
    <text x="53" y="36" text-anchor="middle" font-size="2.8" fill="#AAAAAA">100 × 50 mm final  |  106 × 56 mm with bleed</text>
  </g>

  <!-- ░░░ SPEC LABELS OUTSIDE TEMPLATE ░░░ -->
  <text x="106" y="14" text-anchor="middle" font-size="4" fill="#111827" font-weight="bold">100 × 50 mm LABEL TEMPLATE</text>

  <!-- Dimension annotations -->
  <!-- Width arrow -->
  <line x1="53" y1="95" x2="159" y2="95" stroke="#555" stroke-width="0.5"/>
  <polygon points="53,94 53,96 50,95" fill="#555"/>
  <polygon points="159,94 159,96 162,95" fill="#555"/>
  <text x="106" y="102" text-anchor="middle" font-size="3.5" fill="#555">100mm (final) / 106mm (with bleed)</text>

  <!-- Height arrow -->
  <line x1="168" y1="28" x2="168" y2="84" stroke="#555" stroke-width="0.5"/>
  <polygon points="167,28 169,28 168,25" fill="#555"/>
  <polygon points="167,84 169,84 168,87" fill="#555"/>
  <text x="182" y="57" text-anchor="middle" font-size="3.5" fill="#555" transform="rotate(-90 182 57)">50mm / 56mm bleed</text>

  <!-- Legend -->
  <rect x="2" y="98" width="208" height="12" fill="white" stroke="#E5E7EB" stroke-width="0.3"/>
  <rect x="5" y="101" width="5" height="3.5" fill="#FFE8EA" stroke="#CC2233" stroke-width="0.3"/>
  <text x="12" y="104" font-size="3" fill="#444">Bleed (3mm)</text>
  <rect x="55" y="101" width="5" height="3.5" fill="none" stroke="#000" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="62" y="104" font-size="3" fill="#444">Trim line</text>
  <rect x="105" y="101" width="5" height="3.5" fill="none" stroke="#2563EB" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="112" y="104" font-size="3" fill="#444">Safe zone (3mm)</text>
  <text x="155" y="104" font-size="2.8" fill="#888">speedy-print.co.za</text>
</svg>
