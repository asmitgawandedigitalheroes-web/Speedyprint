<?xml version="1.0" encoding="UTF-8"?>
<!-- Speedy Print | Coffee Cup Sleeve Artwork Template
     Final size: 270 × 70 mm  |  Bleed: 3 mm all sides  |  Safe zone: 3 mm inside trim
     Total artboard (with bleed): 276 × 76 mm
     Colour mode: CMYK  |  Resolution: 300 DPI minimum  |  Fonts: Outlined/Embedded
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="276mm" height="76mm"
     viewBox="0 0 276 76"
     font-family="Arial, Helvetica, sans-serif">

  <!-- ░░░ BLEED AREA ░░░ -->
  <rect x="0" y="0" width="276" height="76" fill="#FFE8EA"/>
  <text x="1" y="5" font-size="3" fill="#CC2233" font-weight="bold">BLEED AREA — extend all backgrounds 3mm beyond this edge</text>

  <!-- ░░░ TRIM LINE ░░░ -->
  <rect x="3" y="3" width="270" height="70" fill="white" stroke="#000000" stroke-width="0.3" stroke-dasharray="4,2"/>
  <text x="4.5" y="9" font-size="3" fill="#333">TRIM LINE — final cut edge (270 × 70 mm)</text>

  <!-- ░░░ SAFE ZONE ░░░ -->
  <rect x="6" y="6" width="264" height="64" fill="#F8FAFF" stroke="#2563EB" stroke-width="0.35" stroke-dasharray="3,2"/>
  <text x="7.5" y="13" font-size="3" fill="#2563EB">SAFE ZONE — keep all text and logos inside this boundary</text>

  <!-- ░░░ CROP MARKS ░░░ -->
  <line x1="0" y1="3" x2="2.5" y2="3" stroke="#000" stroke-width="0.2"/>
  <line x1="3" y1="0" x2="3" y2="2.5" stroke="#000" stroke-width="0.2"/>
  <line x1="273.5" y1="3" x2="276" y2="3" stroke="#000" stroke-width="0.2"/>
  <line x1="273" y1="0" x2="273" y2="2.5" stroke="#000" stroke-width="0.2"/>
  <line x1="0" y1="73" x2="2.5" y2="73" stroke="#000" stroke-width="0.2"/>
  <line x1="3" y1="73.5" x2="3" y2="76" stroke="#000" stroke-width="0.2"/>
  <line x1="273.5" y1="73" x2="276" y2="73" stroke="#000" stroke-width="0.2"/>
  <line x1="273" y1="73.5" x2="273" y2="76" stroke="#000" stroke-width="0.2"/>

  <!-- ░░░ CONTENT PLACEHOLDER ZONES ░░░ -->
  <!-- Wrap note -->
  <line x1="6" y1="6" x2="6" y2="70" stroke="#F97316" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="270" y1="6" x2="270" y2="70" stroke="#F97316" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="8" y="20" font-size="2.5" fill="#F97316">← Sleeve wraps around cup. Left and right edges will overlap.</text>

  <!-- Logo / brand area (left third) -->
  <rect x="10" y="18" width="60" height="40" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="40" y="35" text-anchor="middle" font-size="4.5" fill="#CCCCCC">LOGO</text>
  <text x="40" y="42" text-anchor="middle" font-size="3" fill="#AAAAAA">Brand / Company</text>

  <!-- Main content area (centre) -->
  <rect x="78" y="18" width="120" height="40" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="138" y="36" text-anchor="middle" font-size="6" fill="#CCCCCC" font-weight="bold">MAIN ARTWORK</text>
  <text x="138" y="46" text-anchor="middle" font-size="3" fill="#AAAAAA">Tagline / Message / Design</text>

  <!-- Right area -->
  <rect x="206" y="18" width="58" height="40" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="235" y="35" text-anchor="middle" font-size="3.5" fill="#CCCCCC">CONTACT</text>
  <text x="235" y="42" text-anchor="middle" font-size="3" fill="#AAAAAA">Phone / Web</text>

  <!-- ░░░ NOTES BANNER ░░░ -->
  <rect x="0" y="65" width="276" height="11" fill="white" stroke="#E5E7EB" stroke-width="0.3"/>
  <text x="3" y="68.5" font-size="2.8" fill="#111827" font-weight="bold">SPEEDY PRINT — COFFEE CUP SLEEVE TEMPLATE  |  270 × 70 mm</text>
  <rect x="3" y="70.5" width="4.5" height="3" fill="#FFE8EA" stroke="#CC2233" stroke-width="0.3"/>
  <text x="9" y="73" font-size="2.5" fill="#444">Bleed (3mm)</text>
  <rect x="45" y="70.5" width="4.5" height="3" fill="none" stroke="#000" stroke-width="0.35" stroke-dasharray="2,1"/>
  <text x="51" y="73" font-size="2.5" fill="#444">Trim line</text>
  <rect x="85" y="70.5" width="4.5" height="3" fill="none" stroke="#2563EB" stroke-width="0.35" stroke-dasharray="2,1"/>
  <text x="91" y="73" font-size="2.5" fill="#444">Safe zone</text>
  <rect x="120" y="70.5" width="4.5" height="3" fill="none" stroke="#F97316" stroke-width="0.35" stroke-dasharray="2,1"/>
  <text x="126" y="73" font-size="2.5" fill="#444">Wrap edge</text>
  <text x="3" y="75.5" font-size="2.2" fill="#666">Min. 300 DPI at print size  |  CMYK colour mode  |  All fonts outlined or embedded in PDF  |  speedy-print.co.za</text>
</svg>
