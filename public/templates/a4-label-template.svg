<?xml version="1.0" encoding="UTF-8"?>
<!-- Speedy Print | A4 Label Sheet Artwork Template
     Final size: 210 × 297 mm  |  Bleed: 3 mm all sides  |  Safe zone: 3 mm inside trim
     Total artboard (with bleed): 216 × 303 mm
     Colour mode: CMYK  |  Resolution: 300 DPI minimum  |  Fonts: Outlined/Embedded
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="216mm" height="303mm"
     viewBox="0 0 216 303"
     font-family="Arial, Helvetica, sans-serif">

  <!-- ░░░ BLEED AREA (full artboard including 3mm bleed) ░░░ -->
  <rect x="0" y="0" width="216" height="303" fill="#FFE8EA"/>
  <text x="2" y="5.5" font-size="2.8" fill="#CC2233" font-weight="bold">BLEED AREA — extend all backgrounds to this edge</text>

  <!-- ░░░ TRIM LINE (final cut size: 210 × 297 mm, offset 3mm from edge) ░░░ -->
  <rect x="3" y="3" width="210" height="297" fill="white" stroke="#000000" stroke-width="0.25" stroke-dasharray="4,2"/>
  <text x="4" y="8.5" font-size="2.8" fill="#333333">TRIM LINE — final cut edge (do not place important content here)</text>

  <!-- ░░░ SAFE ZONE (3mm inside trim = 6mm from bleed edge) ░░░ -->
  <rect x="6" y="6" width="204" height="291" fill="none" stroke="#2563EB" stroke-width="0.35" stroke-dasharray="3,2"/>
  <text x="7.5" y="11" font-size="2.8" fill="#2563EB">SAFE ZONE — keep all text &amp; logos inside this border</text>

  <!-- ░░░ CROP MARKS (at trim corners) ░░░ -->
  <!-- Top-left -->
  <line x1="0" y1="3" x2="2.5" y2="3" stroke="#000" stroke-width="0.2"/>
  <line x1="3" y1="0" x2="3" y2="2.5" stroke="#000" stroke-width="0.2"/>
  <!-- Top-right -->
  <line x1="213.5" y1="3" x2="216" y2="3" stroke="#000" stroke-width="0.2"/>
  <line x1="213" y1="0" x2="213" y2="2.5" stroke="#000" stroke-width="0.2"/>
  <!-- Bottom-left -->
  <line x1="0" y1="300" x2="2.5" y2="300" stroke="#000" stroke-width="0.2"/>
  <line x1="3" y1="300.5" x2="3" y2="303" stroke="#000" stroke-width="0.2"/>
  <!-- Bottom-right -->
  <line x1="213.5" y1="300" x2="216" y2="300" stroke="#000" stroke-width="0.2"/>
  <line x1="213" y1="300.5" x2="213" y2="303" stroke="#000" stroke-width="0.2"/>

  <!-- ░░░ CONTENT PLACEHOLDER ░░░ -->
  <rect x="6" y="6" width="204" height="291" fill="#F8FAFF" stroke="none"/>
  <text x="108" y="140" text-anchor="middle" font-size="10" fill="#AAAAAA" font-weight="bold">PLACE YOUR ARTWORK HERE</text>
  <text x="108" y="152" text-anchor="middle" font-size="4.5" fill="#AAAAAA">Final size: 210 × 297 mm  |  Bleed: 216 × 303 mm</text>
  <text x="108" y="160" text-anchor="middle" font-size="4.5" fill="#AAAAAA">Min. 300 DPI at print size  |  CMYK colour mode  |  Fonts outlined</text>

  <!-- ░░░ LEGEND ░░░ -->
  <rect x="6" y="270" width="204" height="27" fill="white" stroke="#E5E7EB" stroke-width="0.3"/>
  <text x="10" y="276" font-size="3.2" fill="#111827" font-weight="bold">SPEEDY PRINT — A4 ARTWORK TEMPLATE</text>
  <!-- Bleed swatch -->
  <rect x="10" y="279" width="6" height="4" fill="#FFE8EA" stroke="#CC2233" stroke-width="0.3"/>
  <text x="18" y="282.5" font-size="2.8" fill="#444">Bleed area (3mm — extend backgrounds)</text>
  <!-- Trim swatch -->
  <rect x="10" y="285" width="6" height="4" fill="none" stroke="#000" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="18" y="288.5" font-size="2.8" fill="#444">Trim line (final cut size: 210 × 297 mm)</text>
  <!-- Safe zone swatch -->
  <rect x="100" y="279" width="6" height="4" fill="none" stroke="#2563EB" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="108" y="282.5" font-size="2.8" fill="#444">Safe zone (keep critical content inside)</text>
  <text x="100" y="291" font-size="2.5" fill="#888">speedy-print.co.za  |  info@speedyprint.co.za  |  011 027 1811</text>
</svg>
