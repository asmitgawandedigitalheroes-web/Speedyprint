<?xml version="1.0" encoding="UTF-8"?>
<!-- Speedy Print | Business Card Artwork Template
     Final size: 90 × 50 mm  |  Bleed: 3 mm all sides  |  Safe zone: 3 mm inside trim
     Total artboard (with bleed): 96 × 56 mm
     Colour mode: CMYK  |  Resolution: 300 DPI minimum  |  Fonts: Outlined/Embedded
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="96mm" height="56mm"
     viewBox="0 0 96 56"
     font-family="Arial, Helvetica, sans-serif">

  <!-- ░░░ BLEED AREA ░░░ -->
  <rect x="0" y="0" width="96" height="56" fill="#FFE8EA"/>
  <text x="1" y="4.5" font-size="2.5" fill="#CC2233" font-weight="bold">BLEED AREA — extend all backgrounds 3mm beyond this edge</text>

  <!-- ░░░ TRIM LINE ░░░ -->
  <rect x="3" y="3" width="90" height="50" fill="white" stroke="#000000" stroke-width="0.3" stroke-dasharray="4,2"/>
  <text x="4.5" y="8" font-size="2.5" fill="#333">TRIM LINE — final cut edge (90 × 50 mm)</text>

  <!-- ░░░ SAFE ZONE ░░░ -->
  <rect x="6" y="6" width="84" height="44" fill="#F8FAFF" stroke="#2563EB" stroke-width="0.3" stroke-dasharray="3,2"/>
  <text x="7.5" y="12" font-size="2.5" fill="#2563EB">SAFE ZONE — keep all text and logos inside</text>

  <!-- ░░░ CROP MARKS ░░░ -->
  <line x1="0" y1="3" x2="2.5" y2="3" stroke="#000" stroke-width="0.2"/>
  <line x1="3" y1="0" x2="3" y2="2.5" stroke="#000" stroke-width="0.2"/>
  <line x1="93.5" y1="3" x2="96" y2="3" stroke="#000" stroke-width="0.2"/>
  <line x1="93" y1="0" x2="93" y2="2.5" stroke="#000" stroke-width="0.2"/>
  <line x1="0" y1="53" x2="2.5" y2="53" stroke="#000" stroke-width="0.2"/>
  <line x1="3" y1="53.5" x2="3" y2="56" stroke="#000" stroke-width="0.2"/>
  <line x1="93.5" y1="53" x2="96" y2="53" stroke="#000" stroke-width="0.2"/>
  <line x1="93" y1="53.5" x2="93" y2="56" stroke="#000" stroke-width="0.2"/>

  <!-- ░░░ CONTENT PLACEHOLDER ZONES ░░░ -->
  <!-- Logo area (left) -->
  <rect x="9" y="15" width="20" height="20" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="19" y="25.5" text-anchor="middle" font-size="3" fill="#AAAAAA">LOGO</text>

  <!-- Name area -->
  <rect x="33" y="15" width="54" height="8" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="60" y="20.5" text-anchor="middle" font-size="4.5" fill="#CCCCCC" font-weight="bold">YOUR NAME</text>

  <!-- Title area -->
  <rect x="33" y="25" width="54" height="5" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="60" y="28.5" text-anchor="middle" font-size="3" fill="#AAAAAA">Job Title / Tagline</text>

  <!-- Contact area -->
  <rect x="9" y="38" width="78" height="9" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="48" y="43.5" text-anchor="middle" font-size="3" fill="#AAAAAA">Phone  |  Email  |  Website  |  Address</text>

  <!-- ░░░ NOTES BANNER ░░░ -->
  <rect x="6" y="124" width="84" height="0" fill="none"/>
  <rect x="0" y="47.5" width="96" height="8" fill="white" stroke="#E5E7EB" stroke-width="0.3"/>
  <text x="3" y="50.5" font-size="2.5" fill="#111827" font-weight="bold">SPEEDY PRINT — BUSINESS CARD TEMPLATE  |  90 × 50 mm</text>
  <rect x="3" y="52" width="4" height="2.5" fill="#FFE8EA" stroke="#CC2233" stroke-width="0.3"/>
  <text x="8.5" y="54" font-size="2.2" fill="#444">Bleed (3mm)</text>
  <rect x="33" y="52" width="4" height="2.5" fill="none" stroke="#000" stroke-width="0.35" stroke-dasharray="2,1"/>
  <text x="38.5" y="54" font-size="2.2" fill="#444">Trim line</text>
  <rect x="60" y="52" width="4" height="2.5" fill="none" stroke="#2563EB" stroke-width="0.35" stroke-dasharray="2,1"/>
  <text x="65.5" y="54" font-size="2.2" fill="#444">Safe zone</text>
  <text x="3" y="55.5" font-size="2" fill="#666">Min. 300 DPI  |  CMYK  |  Fonts outlined  |  speedy-print.co.za</text>
</svg>
