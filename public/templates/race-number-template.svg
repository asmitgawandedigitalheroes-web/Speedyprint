<?xml version="1.0" encoding="UTF-8"?>
<!-- Speedy Print | Race Number Artwork Template
     Final size: 200 × 150 mm  |  Bleed: 3 mm all sides  |  Safe zone: 3 mm inside trim
     Total artboard (with bleed): 206 × 156 mm
     Colour mode: CMYK  |  Resolution: 300 DPI minimum  |  Fonts: Outlined/Embedded
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="206mm" height="156mm"
     viewBox="0 0 206 156"
     font-family="Arial, Helvetica, sans-serif">

  <!-- ░░░ BLEED AREA ░░░ -->
  <rect x="0" y="0" width="206" height="156" fill="#FFE8EA"/>
  <text x="1" y="5" font-size="3" fill="#CC2233" font-weight="bold">BLEED AREA — extend all backgrounds 3mm beyond this edge</text>

  <!-- ░░░ TRIM LINE ░░░ -->
  <rect x="3" y="3" width="200" height="150" fill="white" stroke="#000000" stroke-width="0.3" stroke-dasharray="4,2"/>
  <text x="4.5" y="9" font-size="3" fill="#333">TRIM LINE — final cut edge (200 × 150 mm)</text>

  <!-- ░░░ SAFE ZONE ░░░ -->
  <rect x="6" y="6" width="194" height="144" fill="#F8FAFF" stroke="#2563EB" stroke-width="0.35" stroke-dasharray="3,2"/>
  <text x="7.5" y="13" font-size="3" fill="#2563EB">SAFE ZONE — all critical text, logos and bib number must stay inside</text>

  <!-- ░░░ CROP MARKS ░░░ -->
  <line x1="0" y1="3" x2="2.5" y2="3" stroke="#000" stroke-width="0.2"/>
  <line x1="3" y1="0" x2="3" y2="2.5" stroke="#000" stroke-width="0.2"/>
  <line x1="203.5" y1="3" x2="206" y2="3" stroke="#000" stroke-width="0.2"/>
  <line x1="203" y1="0" x2="203" y2="2.5" stroke="#000" stroke-width="0.2"/>
  <line x1="0" y1="153" x2="2.5" y2="153" stroke="#000" stroke-width="0.2"/>
  <line x1="3" y1="153.5" x2="3" y2="156" stroke="#000" stroke-width="0.2"/>
  <line x1="203.5" y1="153" x2="206" y2="153" stroke="#000" stroke-width="0.2"/>
  <line x1="203" y1="153.5" x2="203" y2="156" stroke="#000" stroke-width="0.2"/>

  <!-- ░░░ RACE NUMBER PLACEHOLDER ZONES ░░░ -->
  <!-- Main bib number area -->
  <rect x="55" y="38" width="96" height="60" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="103" y="63" text-anchor="middle" font-size="20" fill="#CCCCCC" font-weight="bold">123</text>
  <text x="103" y="74" text-anchor="middle" font-size="3.5" fill="#AAAAAA">BIB NUMBER (variable per athlete)</text>

  <!-- Athlete name area -->
  <rect x="25" y="108" width="156" height="14" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="103" y="117" text-anchor="middle" font-size="5.5" fill="#CCCCCC">ATHLETE NAME</text>

  <!-- Sponsor/logo areas -->
  <rect x="10" y="20" width="36" height="14" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="28" y="28.5" text-anchor="middle" font-size="3" fill="#AAAAAA">SPONSOR</text>
  <rect x="160" y="20" width="36" height="14" fill="#EEEEEE" stroke="#CCCCCC" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="178" y="28.5" text-anchor="middle" font-size="3" fill="#AAAAAA">SPONSOR</text>

  <!-- Eyelets hint -->
  <circle cx="20" cy="45" r="4" fill="none" stroke="#AAAAAA" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="20" y="55" text-anchor="middle" font-size="2.5" fill="#AAAAAA">eyelet</text>
  <circle cx="186" cy="45" r="4" fill="none" stroke="#AAAAAA" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="186" y="55" text-anchor="middle" font-size="2.5" fill="#AAAAAA">eyelet</text>

  <!-- ░░░ NOTES BANNER ░░░ -->
  <rect x="6" y="131" width="194" height="19" fill="white" stroke="#E5E7EB" stroke-width="0.3"/>
  <text x="10" y="136.5" font-size="3.2" fill="#111827" font-weight="bold">SPEEDY PRINT — RACE NUMBER TEMPLATE  |  200 × 150 mm</text>
  <rect x="10" y="139" width="5" height="3.5" fill="#FFE8EA" stroke="#CC2233" stroke-width="0.3"/>
  <text x="17" y="142" font-size="2.8" fill="#444">Bleed (3mm)</text>
  <rect x="55" y="139" width="5" height="3.5" fill="none" stroke="#000" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="62" y="142" font-size="2.8" fill="#444">Trim line</text>
  <rect x="100" y="139" width="5" height="3.5" fill="none" stroke="#2563EB" stroke-width="0.4" stroke-dasharray="2,1"/>
  <text x="107" y="142" font-size="2.8" fill="#444">Safe zone (3mm inside trim)</text>
  <text x="160" y="142" font-size="2.5" fill="#888">speedy-print.co.za</text>
  <text x="10" y="147.5" font-size="2.5" fill="#666">Min. 300 DPI at print size  |  CMYK colour mode  |  All fonts outlined or embedded in PDF</text>
</svg>
